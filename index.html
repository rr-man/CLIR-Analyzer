<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLIR Analyzer — PBX call trace parser</title>
<meta name="description" content="Paste a PBXware/Asterisk AGI CLIR trace and get an instant call analysis. Runs entirely in your browser — no data leaves your machine.">
<style>
:root {
  --ink: #1c355e;
  --ink-soft: #51616e;
  --ink-mute: #8b98a3;
  --paper: #f5f7f8;
  --card: #ffffff;
  --line: #dde4e8;
  --line-strong: #c3ced5;
  --wire: #0e7a5f;
  --wire-bg: #e2f3ec;
  --amber: #9a6b0a;
  --amber-bg: #fbf0d7;
  --alert: #b13a2f;
  --alert-bg: #fbe8e5;
  --signal: #416ba9;
  --signal-bg: #e8eef7;
  --mono: "SF Mono", "Cascadia Code", Consolas, "Liberation Mono", monospace;
  --sans: "Segoe UI", system-ui, -apple-system, Roboto, sans-serif;
  --radius: 8px;
}
html.dark {
  --ink: #e8edf1; --ink-soft: #a9b6c0; --ink-mute: #74828d;
  --paper: #131a20; --card: #1b242c; --line: #2b3742; --line-strong: #3d4c59;
  --wire: #4cc9a4; --wire-bg: #14332a;
  --amber: #e4b45a; --amber-bg: #37301a;
  --alert: #e88276; --alert-bg: #3a201d;
  --signal: #7db3e8; --signal-bg: #1a2a3d;
}
* { box-sizing: border-box; }
body { margin: 0; background: var(--paper); color: var(--ink); font-family: var(--sans); font-size: 15px; line-height: 1.55; }
.wrap { max-width: 980px; margin: 0 auto; padding: 28px 20px 64px; }
header.top { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 6px; padding: 14px 18px; background: var(--card); border: 1px solid var(--line); border-radius: 12px; }
header.top img.brand { height: 40px; width: auto; display: block; }
html.dark header.top img.brand { filter: brightness(0) invert(0.92); }
header.top .titleblock { display: flex; flex-direction: column; }
header.top h1 { font-size: 20px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
header.top .sub { color: var(--ink-mute); font-size: 13px; }
.privacy { font-size: 12.5px; color: var(--ink-soft); background: var(--wire-bg); border: 1px solid var(--wire); border-radius: var(--radius); padding: 7px 12px; margin: 12px 0 18px; display: inline-block; }
.panel { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 18px 20px; margin-bottom: 16px; }
.panel h2 { font-size: 14px; font-weight: 600; margin: 0 0 10px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.06em; }
textarea { width: 100%; min-height: 160px; font-family: var(--mono); font-size: 12px; line-height: 1.5; background: var(--paper); color: var(--ink); border: 1px solid var(--line-strong); border-radius: var(--radius); padding: 10px 12px; resize: vertical; }
textarea:focus { outline: 2px solid var(--signal); outline-offset: 1px; border-color: var(--signal); }
.controls { display: flex; gap: 10px; align-items: center; margin-top: 12px; flex-wrap: wrap; }
button { font-family: var(--sans); font-size: 14px; font-weight: 500; padding: 8px 16px; border-radius: var(--radius); border: 1px solid var(--line-strong); background: var(--card); color: var(--ink); cursor: pointer; }
button:hover { border-color: var(--signal); }
button.primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }
button.primary:hover { opacity: 0.9; }
button:focus-visible { outline: 2px solid var(--signal); outline-offset: 2px; }
.err { color: var(--alert); font-size: 13.5px; }
.hint { color: var(--ink-mute); font-size: 12.5px; }
.idrow { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
.avatar { width: 46px; height: 46px; border-radius: 50%; background: var(--signal-bg); color: var(--signal); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 15px; flex-shrink: 0; }
.idrow .who { flex: 1; min-width: 200px; }
.idrow .who .name { font-weight: 600; font-size: 16px; }
.idrow .who .meta { font-size: 13px; color: var(--ink-soft); }
.badge { font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 999px; border: 1px solid transparent; white-space: nowrap; }
.badge.ok { background: var(--wire-bg); color: var(--wire); border-color: var(--wire); }
.badge.warn { background: var(--amber-bg); color: var(--amber); border-color: var(--amber); }
.badge.bad { background: var(--alert-bg); color: var(--alert); border-color: var(--alert); }
.badge.mute { background: var(--paper); color: var(--ink-soft); border-color: var(--line-strong); }
.grid { display: grid; gap: 12px; margin-bottom: 12px; }
.grid.m3 { grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); }
.grid.c2 { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
.metric { background: var(--paper); border-radius: var(--radius); padding: 12px 14px; }
.metric .lbl { font-size: 12px; color: var(--ink-mute); margin-bottom: 3px; }
.metric .val { font-size: 19px; font-weight: 600; word-break: break-word; }
.metric .sub { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
.card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 14px 18px; }
.card h3 { font-size: 13.5px; font-weight: 600; margin: 0 0 8px; }
.card table { width: 100%; font-size: 13px; border-collapse: collapse; table-layout: fixed; }
.card td { padding: 4px 0; vertical-align: top; }
.card td:first-child { color: var(--ink-soft); width: 46%; }
.card td:last-child { text-align: right; }
.mono { font-family: var(--mono); font-size: 11.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.good { color: var(--wire); font-weight: 500; }
.warntx { color: var(--amber); font-weight: 500; }
.badtx { color: var(--alert); font-weight: 500; }
.mutetx { color: var(--ink-mute); }
.tl { margin: 4px 0 16px; }
.tl .bar { display: flex; height: 12px; border-radius: 6px; overflow: hidden; background: var(--line); }
.tl .ring { background: var(--amber); }
.tl .talk { background: var(--wire); }
.tl .legend { display: flex; justify-content: space-between; font-size: 12px; color: var(--ink-mute); margin-top: 4px; }
.limits .lrow { display: flex; align-items: center; gap: 12px; margin-bottom: 7px; }
.limits .lname { font-size: 13px; color: var(--ink-soft); width: 180px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.limits .ltrack { flex: 1; height: 8px; background: var(--paper); border-radius: 4px; overflow: hidden; }
.limits .lfill { height: 100%; background: var(--signal); border-radius: 4px; }
.limits .lnum { font-size: 12px; color: var(--ink-mute); width: 60px; text-align: right; }
.flags { display: flex; gap: 8px; flex-wrap: wrap; margin: 4px 0 14px; }
.legs-head { display: flex; align-items: center; gap: 10px; margin: 6px 0 10px; }
.leg-tag { font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 999px; letter-spacing: 0.03em; }
.leg-tag.a { background: var(--signal-bg); color: var(--signal); border: 1px solid var(--signal); }
.leg-tag.b { background: var(--wire-bg); color: var(--wire); border: 1px solid var(--wire); }
.leg-arrow { flex: 1; text-align: center; font-size: 12px; color: var(--ink-mute); border-top: 1px dashed var(--line-strong); position: relative; top: 0; }
.notes { font-size: 13.5px; color: var(--ink-soft); }
.notes li { margin-bottom: 4px; }
footer { margin-top: 28px; font-size: 12.5px; color: var(--ink-mute); text-align: center; }
footer a { color: var(--signal); }
.theme-toggle { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--ink-soft); }
.theme-toggle button { padding: 6px 12px; font-size: 13px; }
.theme-toggle button[aria-pressed="true"] { background: var(--signal-bg); border-color: var(--signal); color: var(--signal); font-weight: 600; }
.credit { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 8px; font-size: 14px; color: var(--ink-soft); }
.credit a { display: inline-flex; align-items: center; gap: 6px; color: var(--signal); text-decoration: none; font-weight: 600; }
.credit a:hover { text-decoration: underline; }
.credit .li-icon { width: 18px; height: 18px; display: block; flex-shrink: 0; }
.foot-note { font-size: 12.5px; color: var(--ink-mute); }
.foot-corp { margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--line); }
.foot-corp .company { font-size: 13px; font-weight: 600; color: var(--ink-soft); letter-spacing: 0.02em; }
.foot-corp .conf { font-size: 11.5px; color: var(--ink-mute); margin-top: 6px; max-width: 640px; margin-left: auto; margin-right: auto; line-height: 1.55; }
.foot-corp .conf strong { color: var(--ink-soft); font-weight: 600; }

/* ---- Timeline call-detail view ---- */
.view-tabs { display: flex; gap: 4px; margin: 0 0 14px; background: var(--paper); padding: 4px; border-radius: 10px; border: 1px solid var(--line); width: fit-content; }
.view-tabs button { padding: 6px 16px; font-size: 13px; border: none; background: transparent; border-radius: 7px; color: var(--ink-soft); }
.view-tabs button[aria-pressed="true"] { background: var(--card); color: var(--ink); font-weight: 600; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
.tl3 { display: grid; grid-template-columns: 260px 1fr 300px; gap: 16px; align-items: start; }
@media (max-width: 900px) { .tl3 { grid-template-columns: 1fr; } }
.tl3 .col { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 16px 18px; }
.tl3 .col h3 { font-size: 15px; font-weight: 600; margin: 0 0 14px; color: var(--ink); }
.tl3 .col h3 .chev { color: var(--ink-mute); margin-right: 6px; font-size: 12px; }
.basic-field { margin-bottom: 13px; }
.basic-field .bl { font-size: 12px; color: var(--ink-mute); margin-bottom: 2px; }
.basic-field .bv { font-size: 14px; color: var(--ink); word-break: break-word; }
.chip { display: inline-flex; align-items: center; gap: 7px; background: var(--paper); border: 1px solid var(--line); border-radius: 999px; padding: 3px 12px 3px 3px; font-size: 13.5px; }
.chip .dot { width: 22px; height: 22px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #fff; flex-shrink: 0; }
.chip .dot.p { background: #7a8899; }
.chip .dot.e { background: #e08a3c; }
.sect-divide { border-top: 1px solid var(--line); margin: 16px 0; }
.tl-leg { font-size: 14px; font-weight: 700; margin: 0 0 12px; color: var(--ink); }
.tl-event { display: grid; grid-template-columns: 34px 46px 1fr; gap: 8px; position: relative; padding-bottom: 20px; }
.tl-event:not(:last-child)::before { content: ''; position: absolute; left: 16px; top: 30px; bottom: 0; width: 2px; background: var(--line); }
.tl-ico { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; z-index: 1; }
.tl-ico.dial { background: var(--signal-bg); color: var(--signal); }
.tl-ico.try { background: var(--paper); border: 2px solid var(--signal); color: var(--signal); }
.tl-ico.ans { background: var(--wire-bg); color: var(--wire); }
.tl-ico.vm { background: var(--amber-bg); color: var(--amber); }
.tl-ico.hang { background: var(--alert-bg); color: var(--alert); }
.tl-time { font-size: 13px; color: var(--ink-mute); padding-top: 8px; text-align: right; font-variant-numeric: tabular-nums; }
.tl-body { padding-top: 6px; }
.tl-body .t1 { font-size: 14px; color: var(--ink); font-weight: 500; }
.tl-body .t2 { font-size: 12.5px; color: var(--ink-soft); margin-top: 2px; }
.tl-ended { font-size: 14px; font-weight: 700; color: var(--ink); margin-top: 2px; }
.cbd-metrics { display: flex; gap: 14px; margin-bottom: 16px; flex-wrap: wrap; }
.cbd-metrics .m .l { font-size: 11.5px; color: var(--ink-mute); }
.cbd-metrics .m .v { font-size: 16px; font-weight: 600; font-variant-numeric: tabular-nums; }
.cbd-legend { margin-top: 14px; }
.cbd-legend .lg { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink-soft); margin-bottom: 8px; }
.cbd-legend .sw { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
@media (max-width: 560px) { .card td:first-child { width: 52%; } }
</style>
</head>

      + row('Full User-Agent', d.userAgent ? '<span class="mono">' + esc(d.userAgent) + '</span>' : null, 'mutetx')
      + row('Protocol', d.protocol ? esc(d.protocol) : null)
      + row('Registered from', r.srcIp ? '<span class="mono">' + esc(r.srcIp) + '</span>' + (r.isPrivateIp === false ? ' <span class="warntx">(remote / internet)</span>' : (r.isPrivateIp ? ' <span class="mutetx">(LAN)</span>' : '')) : null)
      + (deviceNote ? '<tr><td colspan="2" style="padding-top:8px;color:var(--ink-mute);font-size:12px;line-height:1.5;">' + deviceNote + '</td></tr>' : ''));
    // small helper card explaining where to get it definitively
    h += card('How to identify the device',
        row('From this trace', knownModel ? '<span class="good">Identified above</span>' : '<span class="mutetx">Not present</span>', knownModel ? '' : 'mutetx')
      + row('gloCOM signal', d.glocom ? '<span class="good">Detected — softphone app</span>' : 'Not detected', d.glocom ? '' : 'mutetx')
      + row('SIP User-Agent', '<span class="mono">pjsip set logger on</span> → read UA header')
      + row('PBXware panel', 'Extension → UAD field shows the assigned device')
      + row('Live registration', '<span class="mono">pjsip show endpoint ' + esc(internalExt || '<ext>') + '</span>'));
    h += '</div>';
  }

  // ---- Queue / call center ----
  if (r.isQueueCall || r.viaVoiceAI) {
    h += '<div class="grid c2">';
    h += card(r.isQueueCall ? 'Queue / call center' : 'Call center',
        row('Queue', r.queueName ? '<strong>' + esc(r.queueName) + '</strong>' : (r.isQueueCall ? 'Queue call' : 'Not a queue call'), (r.queueName || r.isQueueCall) ? '' : 'mutetx')
      + row('Answered by agent', r.agent ? '<strong>' + esc(r.agent) + '</strong>' : (r.abandoned ? '<span class="warntx">Abandoned (no agent)</span>' : '<span class="mutetx">Unknown</span>'))
      + row('Agent interface', r.agentInterface ? '<span class="mono">' + esc(r.agentInterface) + '</span>' : null, 'mutetx')
      + row('Hold / wait time', r.queueHold != null ? esc(hms(parseInt(r.queueHold,10))) : null)
      + row('Talk time', r.queueTalk ? esc(hms(parseInt(r.queueTalk,10))) : null)
      + row('Queue position', r.queuePosition ? esc(r.queuePosition) : null, 'mutetx')
      + row('Abandoned', r.abandoned ? '<span class="warntx">Yes</span>' : 'No', r.abandoned ? '' : 'mutetx'));
    h += card('Inbound routing',
        row('Voice AI path', r.viaVoiceAI ? '<strong>Via Telnyx voice AI</strong> → transferred back to queue' + (r.queueName ? ' (' + esc(r.queueName) + ')' : '') : 'Not routed through voice AI', r.viaVoiceAI ? '' : 'mutetx')
      + row('AI forward number', r.voiceAINumber ? esc(fmtNum(r.voiceAINumber)) : null)
      + row('Original DID', r.didNumber ? '<strong>' + esc(fmtNum(r.didNumber)) + '</strong>' : null)
      + row('DID extension', r.didCalled ? esc(r.didCalled) : null)
      + row('DID trunk', r.didTrunk ? esc(r.didTrunk) : null)
      + row('RDNIS', r.rdnis ? esc(fmtNum(r.rdnis)) : null, 'mutetx')
      + row('Disconnected by', r.hangupReason ? '<strong>' + esc(hrMap[r.hangupReason.toUpperCase()] || r.hangupReason) + '</strong> <span class="good" style="font-size:11px;">(HANGUP_REASON)</span>' : '<span class="mutetx">Not recorded</span>')
      + row('Via Local channel', r.isLocalChannel ? 'Yes (forward/transfer leg)' : 'No', r.isLocalChannel ? '' : 'mutetx'));
    h += '</div>';
  }

  // ---- Operation times (business hours) ----
  {
    const enabled = r.opTimesApplied;
    const statusBadge = !r.opTimesLoaded
      ? '<span class="mutetx">No operation-times evaluation in trace</span>'
      : (enabled
          ? '<span class="good">Enabled — applied to this call</span>'
          : '<span class="warntx">Evaluated but skipped (call passed through)</span>');
    h += '<div class="grid c2">';
    h += card('Operation times (business hours)',
        row('Status', statusBadge)
      + row('Configured level', r.opTimesLevel ? '<strong>' + esc(r.opTimesLevel) + '</strong>' : (r.opTimesLoaded ? 'Server (default)' : 'None'), r.opTimesLevel ? '' : 'mutetx')
      + row('Loaded', r.opTimesLoaded ? 'Yes' : 'No', r.opTimesLoaded ? '' : 'mutetx')
      + row('Applied', enabled ? '<span class="good">Yes</span>' : 'No (skipped)', enabled ? '' : 'mutetx')
      + row('Open / closed', r.opTimesStatus ? esc(r.opTimesStatus.charAt(0).toUpperCase() + r.opTimesStatus.slice(1)) : 'Not indicated in trace', r.opTimesStatus ? '' : 'mutetx'));
    h += '</div>';
  }

  if (r.dialFlagInfo && r.dialFlagInfo.length) {
    h += '<div class="card" style="margin-bottom:12px;"><h3>Dial options decoded</h3><ul class="notes" style="margin:0;padding-left:18px;">'
      + r.dialFlagInfo.map(f => '<li>' + esc(f) + '</li>').join('') + '</ul></div>';
  }

  if (r.limits.length || r.limitExceeded.length) {
    h += '<div class="card limits" style="margin-bottom:12px;"><h3>Concurrency limits at dial time</h3>';
    for (const l of r.limits) {
      const pct = Math.max(2, Math.round(l.used / l.cap * 100));
      h += '<div class="lrow"><span class="lname">' + esc(l.name) + '</span><div class="ltrack"><div class="lfill" style="width:' + pct + '%"></div></div><span class="lnum">' + l.used + ' / ' + l.cap + '</span></div>';
    }
    for (const name of r.limitExceeded) h += '<div class="lrow"><span class="lname badtx">' + esc(name) + '</span><span class="badtx">LIMIT EXCEEDED</span></div>';
    h += '</div>';
  }
  h += '</div>';
  const detailsHtml = h;
  const timelineHtml = buildTimeline(r);
  const tabs = '<div class="view-tabs" role="group" aria-label="View">'
    + '<button id="vt-timeline" aria-pressed="true">Timeline</button>'
    + '<button id="vt-details" aria-pressed="false">Full details</button></div>';
  const outEl = document.getElementById('out');
  outEl.innerHTML = tabs + '<div id="view-timeline">' + timelineHtml + '</div><div id="view-details" style="display:none;">' + detailsHtml + '</div>';
  const bt = document.getElementById('vt-timeline'), bd = document.getElementById('vt-details');
  const vT = document.getElementById('view-timeline'), vD = document.getElementById('view-details');
  bt.addEventListener('click', () => { vT.style.display=''; vD.style.display='none'; bt.setAttribute('aria-pressed','true'); bd.setAttribute('aria-pressed','false'); });
  bd.addEventListener('click', () => { vT.style.display='none'; vD.style.display=''; bd.setAttribute('aria-pressed','true'); bt.setAttribute('aria-pressed','false'); });

  lastSummary = [
    'CLIR summary (' + (inbound ? 'inbound' : 'outbound') + ')',
    inbound
      ? 'Caller: ' + (fmtNum(r.extCaller) || 'unknown') + (r.name ? ' (' + r.name + ')' : '') + ' -> DID ' + (fmtNum(r.calledExt) || '?')
      : 'Caller: ' + (r.name || '?') + ' (ext ' + (r.ext || '?') + '), CID sent ' + (fmtNum(r.cidOut) || '?'),
    inbound
      ? 'Route/trunk: ' + (r.trunk || '?')
      : 'Dialed: ' + (fmtNum(r.dnid) || '?') + (r.klass ? ' [' + r.klass.label + ']' : '') + ' via ' + (r.trunk || '?'),
    'Result: ' + (r.dialstatus || '?') + ', talk ' + (fmtDur(r.ansTime) || '?') + (r.ring !== null ? ', ring ~' + r.ring + 's' : ''),
    'Window: ' + (r.startT || '?') + ' → ' + (r.endT || '?'),
    'Recording: ' + (r.monitorActive ? 'active' : 'not started') + (r.recFormat ? ' (on-demand armed, ' + r.recFormat + ')' : ''),
    'Forwarding: ' + (r.cfActive ? 'ACTIVE' : 'none') + ' · Disconnected by: not in trace',
    'Endpoint: ' + (r.srcIp || '?') + (r.isPrivateIp === false ? ' (remote/public)' : ' (LAN)'),
    'Channel: ' + (r.channel || '?') + ' · SIP ID: ' + (r.sipId || '?')
  ].join('\n');
  document.getElementById('btn-copy').hidden = false;
}
document.getElementById('btn-analyze').addEventListener('click', () => {
  const t = document.getElementById('clir-in').value;
  const err = document.getElementById('err');
  err.textContent = '';
  document.getElementById('copied').textContent = '';
  if (!t.trim()) { err.textContent = 'Paste a trace first.'; return; }
  if (!t.includes('agi_')) { err.textContent = 'This does not look like an AGI/CLIR trace (no agi_ headers found).'; document.getElementById('out').innerHTML = ''; return; }
  render(parse(t));
});
document.getElementById('btn-clear').addEventListener('click', () => {
  document.getElementById('clir-in').value = '';
  document.getElementById('out').innerHTML = '';
  document.getElementById('err').textContent = '';
  document.getElementById('copied').textContent = '';
  document.getElementById('btn-copy').hidden = true;
});
document.getElementById('btn-copy').addEventListener('click', async () => {
  try { await navigator.clipboard.writeText(lastSummary); document.getElementById('copied').textContent = 'Summary copied.'; }
  catch (e) { document.getElementById('copied').textContent = 'Copy failed — clipboard blocked.'; }
});
const ta = document.getElementById('clir-in');
ta.addEventListener('dragover', e => e.preventDefault());
ta.addEventListener('drop', e => {
  e.preventDefault();
  const f = e.dataTransfer.files && e.dataTransfer.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = () => { ta.value = reader.result; };
  reader.readAsText(f);
});
// Copyright year
(function () {
  const y = document.getElementById('copyright-year');
  if (y) y.textContent = new Date().getFullYear();
})();
</script>
</body>
</html>
